    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "f4:39:09:18:25:48"
        dhcp: false
        addresses:
          - "192.168.1.12/24"
        routes:
          - gateway: "192.168.1.1"
        mtu: 1500
        vip:
          ip: "192.168.1.5"
    patches:
      - # Encrypt system disk with TPM
        |-
        machine:
          systemDiskEncryption:
            state:
              provider: luks2
              keys:
                - slot: 0
                  tpm: {}
            ephemeral:
              provider: luks2
              keys:
                - slot: 0
                  tpm: {}
      - # Load kernel modules
        |-
        machine:
          kernel:
            modules:
              - name: mlx5-core
  - hostname: "talos-cp-3"
    ipAddress: "192.168.1.13"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: true
    talosImageURL: factory.talos.dev/installer-secureboot/376567988ad370138ad8b2698212367b8edcb69b5fd68c80be1f2ec7d603b4ba
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "b0:0c:d1:52:84:85"
        dhcp: false
        addresses:
          - "192.168.1.13/24"
        routes:
          - gateway: "192.168.1.1"
        mtu: 1500
        vip:
          ip: "192.168.1.5"
    patches:
      - # Encrypt system disk with TPM
        |-
        machine:
