---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://[2001:470:e246:1::100]:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "2001:470:e246:1::100"
  - "kube.rnatr.com"
additionalMachineCertSans: *sans

clusterPodNets: ["2001:470:e246:1000::/52"]
clusterSvcNets: ["fd00:10:96::/108"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "talos-cp-1"
    ipAddress: "192.168.1.11"
    installDisk: "/dev/nvme1n1"
    talosImageURL: factory.talos.dev/installer/c3ff19ffec90f9ce45a8b80807b0e7614f94142f9959aabdecb7956024da9f2b
    controlPlane: true
    patches:
      - # Load kernel modules
        |-
        machine:
          kernel:
            modules:
              - name: mlx5-core
      - # Network configuration
        |-
        ---
        apiVersion: v1alpha1
        kind: LinkAliasConfig
        name: net0  # <--- This is the common name Multus will look for
        selector:
          # Match this specific node's hardware by MAC
          match: "mac(link.permanent_addr) == '1c:34:da:6a:fc:56'"
        ---
        apiVersion: v1alpha1
        kind: Layer2VIPConfig
        name: 192.168.1.5
        link: net0
        ---
        apiVersion: v1alpha1
        kind: LinkConfig
        name: net0
        addresses:
          - address: 192.168.1.11/24
          - address: 2001:470:e246:1::11/64
        mtu: 1480
        routes:
          - gateway: 192.168.1.1
          - gateway: 2001:470:e246::1
        up: true
        ---
        apiVersion: v1alpha1
        kind: VLANConfig
        name: net0.10
        vlanID: 10
        parent: net0
        addresses:
          - address: 192.168.2.11/24
        routes:
          - gateway: 192.168.2.1
            metric: 2000
        mtu: 9000
        ---
        apiVersion: v1alpha1
        kind: VLANConfig
        name: net0.30
        vlanID: 30
        parent: net0
        addresses:
          - address: fd00:30::11/64
        routes:
          - gateway: fd00:30::1/64
            metric: 3000
        mtu: 9000
        ---
        apiVersion: v1alpha1
        kind: VLANConfig
        name: net0.40
        vlanID: 40
        parent: net0
        addresses:
          - address: fd00:40::11/64
        routes:
          - gateway: fd00:40::1/64
