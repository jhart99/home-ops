---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://192.168.1.75:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "192.168.1.75"
  - "kube.rnatr.com"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "talos-cp-1"
    ipAddress: "192.168.1.11"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: true
    talosImageURL: factory.talos.dev/installer-secureboot/c3ff19ffec90f9ce45a8b80807b0e7614f94142f9959aabdecb7956024da9f2b
    controlPlane: true
    patches:
      - # Load kernel modules
        |-
        machine:
          kernel:
            modules:
              - name: mlx5-core
      - # Network configuration
        |-
        ---
        apiVersion: v1alpha1
        kind: LinkAliasConfig
        name: net0  # <--- This is the common name Multus will look for
        selector:
          # Match this specific node's hardware by MAC
          match: "mac(link.permanent_addr) == '1c:34:da:6a:fc:56'"
        ---
        apiVersion: v1alpha1
        kind: Layer2VIPConfig
        name: 192.168.1.5
        link: net0
        ---
        apiVersion: v1alpha1
        kind: LinkConfig
        name: net0
        addresses:
          - address: 192.168.1.11/24
        mtu: 9000
        routes:
          - gateway: 192.168.1.1
        up: true
        ---
        apiVersion: v1alpha1
        kind: VLANConfig
        name: net0.10
        vlanID: 10
        parent: net0
        addresses:
          - address: 192.168.2.11/24
        routes:
          - gateway: 192.168.2.1
            metric: 2000
        mtu: 9000
        ---
        apiVersion: v1alpha1
        kind: Layer2VIPConfig
        name: 192.168.2.5
        link: net0.10
        ---
        apiVersion: v1alpha1
        kind: VLANConfig
        name: net0.100
        vlanID: 100
        parent: net0
        addresses:
          - address: 192.168.100.11/24
        routes:
          - gateway: 192.168.100.1
            metric: 3000
        mtu: 9000

