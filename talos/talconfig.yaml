      - # Network configuration
        |-
        ---
        apiVersion: v1alpha1
        kind: LinkAliasConfig
        name: net0  # <--- This is the common name Multus will look for
        selector:
          # Match this specific node's hardware by MAC
          match: "mac(link.permanent_addr) == '1c:34:da:6b:22:1a'"
        ---
        apiVersion: v1alpha1
        kind: LinkConfig
        name: net0
        addresses:
          - address: 192.168.1.12/24
        mtu: 9000
        routes:
          - gateway: 192.168.1.1
        up: true
        ---
        apiVersion: v1alpha1
        kind: Layer2VIPConfig
        name: 192.168.1.5
        link: net0
        ---
        apiVersion: v1alpha1
        kind: VLANConfig
        name: net0.10
        vlanID: 10
        parent: net0
        addresses:
          - address: 192.168.2.12/24
        routes:
          - gateway: 192.168.2.1
            metric: 2000
        mtu: 9000
        ---
        apiVersion: v1alpha1
        kind: VLANConfig
        name: net0.100
        vlanID: 100
        parent: net0
        addresses:
          - address: 192.168.100.12/24
        routes:
          - gateway: 192.168.100.1
            metric: 3000
        mtu: 9000
  - hostname: "talos-cp-3"
    ipAddress: "192.168.1.13"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: true
    talosImageURL: factory.talos.dev/installer-secureboot/376567988ad370138ad8b2698212367b8edcb69b5fd68c80be1f2ec7d603b4ba
    controlPlane: true
    patches:
      - # Encrypt system disk with TPM
        |-
        machine:
          systemDiskEncryption:
            state:
              provider: luks2
