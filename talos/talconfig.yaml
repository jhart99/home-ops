    controlPlane: true
    patches:
      - # Load kernel modules
        |-
        machine:
          kernel:
            modules:
              - name: mlx5-core
      - # Network configuration
        |-
        ---
        apiVersion: v1alpha1
        kind: LinkAliasConfig
        name: net0  # <--- This is the common name Multus will look for
        selector:
          # Match this specific node's hardware by MAC
          match: "mac(link.permanent_addr) == '1c:34:da:6a:fc:56'"
        ---
        apiVersion: v1alpha1
        kind: Layer2VIPConfig
        name: 2001:470:e246::100
        link: net0
        ---
        apiVersion: v1alpha1
        kind: LinkConfig
        name: net0
        addresses:
          - address: 192.168.1.11/24
          - address: 2001:470:e246::11/64
        mtu: 9000
        routes:
          - gateway: 192.168.1.1
        up: true
        ---
        apiVersion: v1alpha1
        kind: VLANConfig
        name: net0.10
        vlanID: 10
        vlanMode: 802.1q
        parent: net0
        addresses:
          - address: 192.168.2.11/24
        routes:
          - gateway: 192.168.2.1
            metric: 2000
        mtu: 9000
        ---
        apiVersion: v1alpha1
        kind: VLANConfig
        name: net0.30
        vlanID: 30
        vlanMode: 802.1q
        parent: net0
        addresses:
          - address: 192.168.3.11/24
        mtu: 9000
        ---
