---
customization:
  extraKernelArgs:
    # --- Performance ---
    - mitigations=off             # Big boost. Disables Spectre/Meltdown patches. (Risk: High if running untrusted code)
    - init_on_alloc=0             # Minor boost. Don't scrub RAM on create. (Risk: Low/Medium data leaks)
    - init_on_free=0              # Minor boost. Don't scrub RAM on delete. (Risk: Low/Medium data leaks)
    - talos.auditd.disabled=1     # Moderate boost. Disables the heavy "security camera" logs.

    # --- Hardware Stability (Intel Meteor Lake & iGPU Fixes) ---
    - i915.enable_dc=0            # Prevents random hard freezes on newer Intel chips.
    - i915.enable_guc=3           # Enables GuC/HuC firmware loading for better iGPU encoding/transcoding.
    - intel_idle.max_cstate=7     # Prevents CPU from sleeping too deep and crashing headless systems.

    # --- Intel ARC fixes ---
    - xe.force_probe=56a6
    - i915.force_probe=!56a6

    # --- Passthrough & Networking ---
    - intel_iommu=on              # Enables IOMMU for PCI passthrough.
    - iommu=pt                    # "Passthrough" mode. Improves host performance when IOMMU is on.
    - -lockdown                   # Without this I couldn't get the next one to apply
    - lockdown=none               # Required for Cilium's eBPF features to modify kernel networking.

    # --- Security Defaults ---
    - sysctl.kernel.kexec_load_disabled=1 # Prevents loading a new kernel at runtime (Standard security practice).

  systemExtensions:
    officialExtensions:
      - siderolabs/i915           # GPU Drivers
      - siderolabs/intel-ucode    # CPU Microcode updates
      - siderolabs/mei            # Management Engine Interface (Required for some Intel GPU features)
      - siderolabs/xe             # Newer Intel Xe GPU drivers
      - siderolabs/mellanox-mstflint # Drivers for your high-speed NICs