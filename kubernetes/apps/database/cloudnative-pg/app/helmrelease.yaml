---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-operator
spec:
  chartRef:
    kind: OCIRepository
    name: cloudnativepg
  interval: 1h
  values:
    crds:
      create: true
    nodeSelector:
      kubernetes.io/arch: amd64
    monitoring:
      podMonitorEnabled: true
      grafanaDashboard:
        create: true