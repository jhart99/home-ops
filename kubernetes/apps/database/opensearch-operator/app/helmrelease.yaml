---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch-operator
spec:
  interval: 15m
  chart:
    spec:
      chart: opensearch-operator
      version: 3.0.2
      sourceRef:
        kind: HelmRepository
        name: opensearch-operator
  values:
    nodeSelector:
      kubernetes.io/arch: amd64
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities: { drop: ["ALL"] }
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    manager:
      securityContext:
        allowPrivilegeEscalation: false
      resources:
        limits:
          cpu: 1000m
          memory: 500Mi
        requests:
          cpu: 200m
          memory: 350Mi
      image:
        repository: opensearchproject/opensearch-operator
        tag: 3.0.0-alpha@sha256:f78bbdd1a3860839d3022ee9c55abb503d5547967aec938d66805846bae37604
      dnsBase: cluster.local
      metricsBindAddress: 127.0.0.1:8080
    installCRDs: true
    webhook:
      enabled: true
      port: 9443
      failurePolicy: Fail
      secretName: opensearch-operator-tls-secret
      certManager:
        enabled: false
