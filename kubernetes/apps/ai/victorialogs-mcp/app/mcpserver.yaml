---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: &name victorialogs
  annotations:
    toolhive.stacklok.dev/registry-export: "true"
    toolhive.stacklok.dev/registry-title: "Victorialogs"
    toolhive.stacklok.dev/registry-url: "https://github.com/victoriametrics/mcp-victorialogs"
    toolhive.stacklok.dev/registry-description: "This provides access to your VictoriaLogs instance and seamless integration with VictoriaLogs APIs and documentation. It can give you a comprehensive interface for logs, observability, and debugging tasks related to your VictoriaLogs instances, enable advanced automation and interaction capabilities for engineers and tools."
spec:
  image: ghcr.io/victoriametrics/mcp-victorialogs:v1.9.0
  transport: streamable-http
  mcpPort: 8081
  groupRef:
    name: mcp-tools
  permissionProfile:
    type: builtin
    name: network
  env:
    - name: MCP_SERVER_MODE
      value: http
    - name: MCP_LISTEN_ADDR
      value: :8081
    - name: MCP_LOG_FORMAT
      value: json
    - name: MCP_LOG_LEVEL
      value: info
    - name: VL_INSTANCE_ENTRYPOINT
      value: http://victoria-logs-server.observability.svc.cluster.local:9428
  toolConfigRef:
    name: *name
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPToolConfig
metadata:
  name: victorialogs
spec:
  toolsFilter: []