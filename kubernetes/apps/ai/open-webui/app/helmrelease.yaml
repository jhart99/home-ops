---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  chartRef:
    kind: OCIRepository
    name: open-webui
  interval: 1h
  values:
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.9.5@sha256:e045bde3b004cc7f8c319412345eb56c87ea6ac57031534a31ca37ad5424beb3
            env:
              OLLAMA_BASE_URL: http://ollama.ai.svc.cluster.local:11434
              ENABLE_OLLAMA_API: "true"
              WEBUI_AUTH: "true"
              DATA_DIR: /data
              USER_AGENT: "OpenWebUI/0.9.2"
              CORS_ALLOW_ORIGIN: https://open-webui.${SECRET_DOMAIN}
              # Required for OIDC
              OAUTH_CLIENT_ID: kwXD1uXbBGa53v3uKvITLrqaMB0rWohYWl1wyhmp
              OPENID_PROVIDER_URL: https://auth.${SECRET_DOMAIN}/application/o/open-webui/.well-known/openid-configuration
              ENABLE_OAUTH_SIGNUP: true
              OAUTH_PROVIDER_NAME: Authentik
              OAUTH_SCOPES: "openid email profile"
              OPENID_REDIRECT_URI: https://open-webui.${SECRET_DOMAIN}/oauth/oidc/callback
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 60
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        ports:
          http:
            port: &port 8080

    route:
      app:
        hostnames:
          - "open-webui.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          open-webui:
            app:
              - path: /data
                subPath: data
              - path: /app/backend/data
                subPath: cachedata
              - path: /root
                subPath: root
      tmpfs:
        type: emptyDir
        advancedMounts:
          open-webui:
            app:
              - path: /tmp
                subPath: tmp