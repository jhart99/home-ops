---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openvino-bge-m3
spec:
  interval: 1h
  path: ./kubernetes/apps/ai/openvino-bge-m3/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  wait: false
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
