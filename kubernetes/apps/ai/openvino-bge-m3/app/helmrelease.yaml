---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openvino-bge-m3
spec:
  chartRef:
    kind: OCIRepository
    name: openvino-bge-m3
  interval: 1h
  values:
    controllers:
      openvino-bge-m3:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          download-model:
            image:
              repository: python
              tag: 3.14-slim
            command:
              - /bin/sh
              - -ec
              - |
                if [ ! -f /models/bge-m3/config.json ]; then
                  pip install -U huggingface_hub
                  python3 -c 'from huggingface_hub import snapshot_download; snapshot_download(repo_id="BAAI/bge-m3", local_dir="/models/bge-m3")'
                fi
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
        containers:
          app:
            image:
              repository: openvino/model_server
              tag: latest-py
            args:
              - --model_name
              - bge-m3
              - --model_path
              - /models/bge-m3
              - --model_repository_path
              - /models
              - --port
              - "9000"
              - --rest_port
              - "8000"
              - --target_device
              - GPU
              - --task
              - embeddings
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/config
                    port: 8000
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/config
                    port: 8000
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/config
                    port: 8000
                  failureThreshold: 60
                  periodSeconds: 10
            resources:
              requests:
                cpu: 200m
                memory: 2Gi
                gpu.intel.com/i915: "1"
              limits:
                memory: 4Gi
                gpu.intel.com/i915: "1"
    service:
      app:
        controller: openvino-bge-m3
        ports:
          http:
            port: 8000
          grpc:
            port: 9000
    persistence:
      models:
        type: nfs
        server: pve.jonathanrosshart.com
        path: /pool/share/fileshare/models
        globalMounts:
          - path: /models
