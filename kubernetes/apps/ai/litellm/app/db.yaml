apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: litellm-db
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie
  primaryUpdateStrategy: unsupervised
  instances: 2
  storage:
    storageClass: ceph-block
    size: 5Gi
  walStorage:
    storageClass: ceph-block
    size: 1Gi
  bootstrap:
    initdb:
      database: litellm
      owner: litellm
  monitoring:
    enablePodMonitor: true
    customQueriesConfigMap:
      - name: cnpg-default-monitoring
        key: queries
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: litellm-cnpg-s3
  postgresql:
    parameters:
      shared_buffers: 128MB
  resources:
    requests:
      cpu: 50m
    limits:
      memory: 1Gi
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: litellm-database
spec:
  name: litellm
  owner: litellm
  cluster:
    name: litellm-db
