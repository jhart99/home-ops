model_list:
  - model_name: qwen
    litellm_params:
      model: huggingface/dark-jarvis
      api_base: http://llama-cpp.ai.svc.cluster.local:8080/v1
      api_key: "os.environ/LLAMA_API_KEY"
  - model_name: qwen3-embedding
    litellm_params:
      model: huggingface/qwen3-embedding
      api_base: http://openvino-qwen3-embedding.ai.svc.cluster.local:8000/v3/embeddings
    model_info:
      id: qwen3-embedding
      mode: embedding
      input_cost_per_token: 0
      output_cost_per_token: 0
      max_tokens: 32000
      base_model: qwen/qwen3-embedding-0.6b
