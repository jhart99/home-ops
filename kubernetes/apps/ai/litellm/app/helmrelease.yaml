---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  chartRef:
    kind: OCIRepository
    name: litellm
  interval: 1h
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.90.3@sha256:e4b91a2de9367ab0987baaa767b2283390badd5a361357993de1a05f027edc22
            args:
              - --config=/app/config.yaml
            env:
              LITELLM_LOG: INFO
              LITELLM_MODE: PRODUCTION
              REDIS_HOST: litellm-dragonfly.ai.svc.cluster.local
              REDIS_PORT: 6379
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: litellm-db-app
                    key: uri
              LLAMA_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: llama-cpp-secret
                    key: LLAMA_API_KEY
              STORE_MODEL_IN_DB: "True"
            envFrom:
              - secretRef:
                  name: litellm-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 60
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      nodeSelector: { kubernetes.io/arch: amd64 }
    service:
      app:
        controller: litellm
        ports:
          http:
            port: 4000
    route:
      app:
        hostnames:
          - "litellm.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 4000
    persistence:
      config:
        type: configMap
        name: litellm-configmap
        globalMounts:
          - path: /app/config.yaml
            subPath: config.yaml
            readOnly: true
