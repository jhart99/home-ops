---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./cluster.yaml
  - ./db.yaml
  - ./helmrelease.yaml
  - ./objectstore.yaml
  - ./ocirepository.yaml
  - ./scheduledbackup.yaml
  - ./s3-secret.sops.yaml
  - ./secret.sops.yaml
configMapGenerator:
  - name: litellm-configmap
    files:
      - config.yaml=./config.yaml
generatorOptions:
  disableNameSuffixHash: true
