---
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: litellm-cnpg-s3
spec:
  retentionPolicy: 30d
  instanceSidecarConfiguration:
    env:
      - name: BARMAN_S3_USE_PATH_STYLE
        value: "true"
  configuration:
    endpointURL: "http://rustfs.rustfs.svc.cluster.local:9000"
    destinationPath: "s3://cnpg-backups/"
    s3Credentials:
      accessKeyId:
        name: litellm-s3-secret
        key: S3_ACCESS_KEY
      secretAccessKey:
        name: litellm-s3-secret
        key: S3_SECRET_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
