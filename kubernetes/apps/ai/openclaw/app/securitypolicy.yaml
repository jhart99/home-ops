---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: openclaw-oauth-policy
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: openclaw
  oidc:
    provider:
      issuer: "https://auth.${SECRET_DOMAIN}/application/o/openclaw"
    clientID: "4EiLeO0O5q2rvO4RaG1VnGGlhuYx3tMjoqoXXZMk"
    clientSecret:
      name: openclaw-client-secret
    redirectURL: "https://openclaw.${SECRET_DOMAIN}/oauth2/callback"
    cookieDomain: "${SECRET_DOMAIN}"
    cookieNames:
      accessToken: "access-token"
    scopes:
      - "openid"
      - "email"
      - "profile"
      - "groups"
      - "offline_access"
  jwt:
    providers:
      - name: authentik
        issuer: https://auth.${SECRET_DOMAIN}/application/o/openclaw/
        remoteJWKS:
          uri: https://auth.${SECRET_DOMAIN}/application/o/openclaw/jwks/
        extractFrom:
          cookies:
            - "access-token"
        claimToHeaders:
          - claim: email
            header: X-User-Email
          - claim: name
            header: X-User-Name
          - claim: preferred_username
            header: X-User-ID
          - claim: groups
            header: X-User-Groups
