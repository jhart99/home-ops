---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-cpp
spec:
  chartRef:
    kind: OCIRepository
    name: llama-cpp
  interval: 1h
  values:
    controllers:
      llama-cpp:
        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: dgx-template
          securityContext:
            supplementalGroups:
              - 44
              - 992
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        type: deployment
        initContainers:
          download-qwen:
            image:
              repository: ghcr.io/astral-sh/uv
              tag: python3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                cp /models/Qwopus3.6-27B-v1-Abliterated-NVFP4-plain.gguf /tmp
                cp /models/mmproj-Abliterated-F16.gguf /tmp
                cp /models/qwen36-dflash/model.safetensors /tmp
                cp /models/chat_template.jinja /tmp
        containers:
          qwen:
            image:
              repository: ghcr.io/jhart99/llama-cpp-dgx
              tag: latest@sha256:9e98062978ffec1c8712f1408ebdd64f5757433f366c3f3005e9bd7cfe253966
            args:
              - -m
              - /tmp/Qwopus3.6-27B-v1-Abliterated-NVFP4-plain.gguf
              - --mmproj
              - /tmp/mmproj-Abliterated-F16.gguf
              - --spec-type
              - draft-mtp
              - --spec-draft-n-max
              - "5"
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - -c
              - "262144"
              - -np
              - "2"
              - -ngl
              - "99"
              - -ctk
              - q8_0
              - -ctv
              - q8_0
              - --slot-prompt-similarity
              - "0.5"
              - --cache-reuse
              - "256"
              - --cache-ram
              - "16384"
              - -bs
              - --chat-template-file
              - /tmp/chat_template.jinja
              - --jinja
              - --no-prefill-assistant
              - --reasoning
              - off
              - --alias
              - dark-jarvis
              - --alias
              - dark-opus
              - --no-webui
              - --no-warmup
            env:
              LLAMA_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: llama-cpp-secret
                    key: LLAMA_API_KEY
              LLAMA_ARG_HOST: 0.0.0.0
              LLAMA_ARG_PORT: "8080"
              LLAMA_OFFLINE: "1"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 3
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 3
                  periodSeconds: 10
                  timeoutSeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 60
                  periodSeconds: 10
                  timeoutSeconds: 5
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 200m
                memory: 2Gi
                ephemeral-storage: "30Gi"
              limits:
                cpu: 2000m
                memory: 88Gi
                ephemeral-storage: "100Gi"
            securityContext:
              privileged: true
    defaultPodOptions:
      runtimeClassName: nvidia
    service:
      qwen:
        controller: llama-cpp
        ports:
          http:
            port: 8080
            protocol: TCP
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      library:
        type: nfs
        server: pve.jonathanrosshart.com
        path: /pool/share/fileshare/models
        globalMounts:
          - path: /models