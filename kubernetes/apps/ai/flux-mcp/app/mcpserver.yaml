---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: &name flux-operator
spec:
  image: ghcr.io/controlplaneio-fluxcd/flux-operator-mcp:v0.55.0
  transport: stdio
  groupRef:
    name: mcp-tools
  args:
    - serve
  env:
    - name: KUBECONFIG
      value: /kubeconfig/kubeconfig
  toolConfigRef:
    name: *name
  podTemplateSpec:
    spec:
      volumes:
        - name: kubeconfig
          secret:
            secretName: toolhive-flux
            items:
              - key: kubeconfig
                path: kubeconfig
      containers:
        - name: mcp
          volumeMounts:
            - name: kubeconfig
              mountPath: /kubeconfig
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 1
              memory: 256Mi
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 200Mi
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPToolConfig
metadata:
  name: flux-operator
spec:
  toolsFilter: []