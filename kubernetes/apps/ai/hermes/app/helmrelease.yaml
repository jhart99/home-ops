---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  chartRef:
    kind: OCIRepository
    name: hermes
  interval: 1h
  values:
    controllers:
      hermes:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        type: deployment
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                mkdir -p /opt/data
                cp -n /run/config/config.yaml /opt/data/config.yaml
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              runAsGroup: 10000
              runAsUser: 10000
          daemon:
            image:
              repository: docker
              tag: 29.5.3-dind@sha256:ad68e89b675740867a3bb96488a93fea9209ad36c6305bfba2664912d6dcf11a
            restartPolicy: Always
            env:
              DOCKER_TLS_CERTDIR: /certs
            securityContext:
              allowPrivilegeEscalation: true
              privileged: true
              runAsGroup: 0
              runAsUser: 0
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "docker"
                      - "info"
                  failureThreshold: 3
                  periodSeconds: 20
                  timeoutSeconds: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "docker"
                      - "info"
                  failureThreshold: 3
                  periodSeconds: 5
                  timeoutSeconds: 3
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "docker"
                      - "info"
                  failureThreshold: 60
                  periodSeconds: 2
                  timeoutSeconds: 3
        containers:
          app:
            image:
              repository: ghcr.io/jhart99/jhart99-hermes-agent
              tag: v2026.5.29
              digest: sha256:8c97f28a89394ea23a8fd7c387c891c2791415172753bca632ec7027214e91e4
            args:
              - gateway
              - run
            env:
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: 0.0.0.0
              DOCKER_CERT_PATH: /certs/client
              DOCKER_HOST: tcp://localhost:2376
              DOCKER_TLS_VERIFY: "1"
              AGENTMEMORY_URL: http://agentmemory.ai.svc.cluster.local:3111
              GOPATH: /opt/data/go
              HERMES_DASHBOARD: "1"
              HERMES_DASHBOARD_TUI: "1"
              HERMES_DASHBOARD_INSECURE: "1"
              HERMES_GID: "10000"
              HERMES_HOME: /opt/data
              HERMES_UID: "10000"
              HOME: /opt/data
              MATRIX_ENCRYPTION: "true"
              PATH: /opt/data/.local/bin:/opt/data/.local/go/bin:/opt/data/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              PYTHONPATH: /opt/hermes/.venv/lib/python3.13/site-packages/
              SEARXNG_URL: http://searxng.ai.svc.cluster.local:8080
              TERM: xterm-256color
              TZ: &tz America/New_York
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8642
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8642
                  initialDelaySeconds: 5
                  periodSeconds: 10
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8642
                  failureThreshold: 60
                  periodSeconds: 5
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
              limits:
                cpu: 4
                memory: 16Gi
            securityContext:
              allowPrivilegeEscalation: true
              runAsUser: 0
              runAsGroup: 0
              capabilities:
                add:
                  - CHOWN
                  - DAC_OVERRIDE
                  - FOWNER
                  - SETGID
                  - SETUID
                drop:
                  - ALL
              readOnlyRootFilesystem: false

    defaultPodOptions:
      nodeSelector: { kubernetes.io/arch: amd64 }

    service:
      app:
        controller: hermes
        ipFamilies:
          - IPv4
        ports:
          dashboard:
            port: 9119
          gateway:
            port: 8642

    route:
      app:
        hostnames:
          - hermes.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 9119

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /opt/data
      config-yaml:
        type: configMap
        name: hermes-configmap
        defaultMode: 0o755
        advancedMounts:
          hermes:
            init:
              - path: /run/config/config.yaml
                subPath: config.yaml
      plugin-agentmemory:
        type: configMap
        name: hermes-agentmemory-plugin
        globalMounts:
          - path: /opt/hermes/plugins/agentmemory
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      certs:
        type: emptyDir
        globalMounts:
          - path: /certs

    rbac:
      roles:
        hermes-read-all:
          type: ClusterRole
          rules:
            - apiGroups:
                - ""
              resources:
                - pods
                - pods/log
                - nodes
                - services
                - namespaces
                - configmaps
                - persistentvolumes
                - persistentvolumeclaims
                - endpoints
                - resourcequotas
                - limitranges
                - serviceaccounts
                - events
              verbs:
                - "get"
                - "list"
                - "watch"
            - apiGroups:
                - "apps"
              resources:
                - deployments
                - daemonsets
                - statefulsets
                - replicasets
                - controllerrevisions
              verbs:
                - "get"
                - "list"
                - "watch"
            - apiGroups:
                - "batch"
              resources:
                - "jobs"
                - "cronjobs"
              verbs:
                - "get"
                - "list"
                - "watch"
            - apiGroups:
                - "networking.k8s.io"
              resources:
                - "ingresses"
                - "ingressclasses"
                - "networkpolicies"
              verbs:
                - "get"
                - "list"
                - "watch"
            - apiGroups:
                - "storage.k8s.io"
              resources:
                - storageclasses
                - csinodes
                - csidrivers
                - volumeattachments
              verbs:
                - "get"
                - "list"
                - "watch"
            - apiGroups:
                - "helm.toolkit.fluxcd.io"
              resources:
                - "helmreleases"
              verbs:
                - "get"
                - "list"
                - "watch"
            - apiGroups:
                - "kustomize.toolkit.fluxcd.io"
              resources:
                - "kustomizations"
              verbs:
                - "get"
                - "list"
                - "watch"
            - apiGroups:
                - "source.toolkit.fluxcd.io"
              resources:
                - gitrepositories
                - helmrepositories
                - ocirepositories
                - buckets
                - helmcharts
              verbs:
                - "get"
                - "list"
                - "watch"
            - apiGroups:
                - "external-secrets.io"
              resources:
                - externalsecrets
                - secretstores
                - clustersecretstores
              verbs:
                - "get"
                - "list"
                - "watch"
        hermes-pod-delete:
          type: ClusterRole
          rules:
            - apiGroups:
                - ""
              resources:
                - "pods"
              verbs:
                - "delete"
        hermes-exec-deploy:
          type: Role
          rules:
            - apiGroups:
                - ""
              resources:
                - "pods/exec"
              verbs:
                - "create"
            - apiGroups:
                - "apps"
              resources:
                - "deployments"
              verbs:
                - "patch"
                - "update"
      bindings:
        hermes-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: hermes-read-all
          subjects:
            - identifier: hermes
              serviceAccount: hermes
        hermes-pod-delete:
          type: ClusterRoleBinding
          roleRef:
            identifier: hermes-pod-delete
          subjects:
            - identifier: hermes
              serviceAccount: hermes
        hermes-exec-deploy:
          type: RoleBinding
          roleRef:
            identifier: hermes-exec-deploy
          subjects:
            - identifier: hermes
              serviceAccount: hermes
              namespace: ai
    serviceAccount:
      hermes: {}