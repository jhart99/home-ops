---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: toolhive-registry
spec:
  chartRef:
    kind: OCIRepository
    name: toolhive-registry
  interval: 1h
  values:
    fullnameOverride: toolhive-registry
    podAnnotations:
      reloader.stakater.com/auto: "true"
    extraEnv:
      - name: THV_REGISTRY_DATABASE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: toolhive-db-app
            key: password
      - name: THV_REGISTRY_DATABASE_MIGRATIONPASSWORD
        valueFrom:
          secretKeyRef:
            name: toolhive-db-superuser
            key: password
      - name: PGSSLROOTCERT
        value: "/etc/ssl/certs/cnpg/ca.crt"
    extraVolumes:
      - name: cnpg-ca-volume
        secret:
          secretName: toolhive-db-ca
          items:
            - key: ca.crt
              path: ca.crt
    extraVolumeMounts:
      - name: cnpg-ca-volume
        mountPath: /etc/ssl/certs/cnpg
        readOnly: true
    config:
      sources:
        - name: toolhive
          git:
            repository: https://github.com/stacklok/toolhive-catalog.git
            branch: main
            path: pkg/catalog/toolhive/data/registry-upstream.json
          syncPolicy:
            interval: 360m
        # Discover MCPServer CRs running in-cluster (e.g. ha-mcp) via the
        # operator. RBAC is cluster-scoped, so it can watch the mcp namespace.
        - name: cluster
          kubernetes:
            namespaces: ["ai"]
          syncPolicy:
            interval: 360m
      registries:
        - name: default
          sources: ["toolhive", "cluster"]
      auth:
        mode: anonymous
      database:
        host: toolhive-db-rw
        port: 5432
        user: toolhive
        migrationUser: postgres
        database: toolhive
        sslMode: verify-ca
        maxOpenConns: 10
        maxIdleConns: 5
        connMaxLifetime: 30m