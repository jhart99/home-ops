---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: toolhive-registry
spec:
  chartRef:
    kind: OCIRepository
    name: toolhive-registry
  interval: 1h
  values:
    podAnnotations:
      reloader.stakater.com/auto: "true"
    extraEnv:
      - name: PGHOST
        valueFrom:
          secretKeyRef:
            name: toolhive-db-app
            key: host
      - name: PGPORT
        valueFrom:
          secretKeyRef:
            name: toolhive-db-app
            key: port
      - name: PGDATABASE
        valueFrom:
          secretKeyRef:
            name: toolhive-db-app
            key: dbname
      - name: PGUSER
        valueFrom:
          secretKeyRef:
            name: toolhive-db-app
            key: username
      - name: PGPASSWORD
        valueFrom:
          secretKeyRef:
            name: toolhive-db-app
            key: password
    config:
      sources:
        - name: toolhive
          git:
            repository: https://github.com/stacklok/toolhive-catalog.git
            branch: main
            path: pkg/catalog/toolhive/data/registry-upstream.json
          syncPolicy:
            interval: 30m
        # Discover MCPServer CRs running in-cluster (e.g. ha-mcp) via the
        # operator. RBAC is cluster-scoped, so it can watch the mcp namespace.
        - name: cluster
          kubernetes:
            namespaces: ["ai"]
          syncPolicy:
            interval: 5m
      registries:
        - name: default
          sources: ["toolhive", "cluster"]
      auth:
        mode: anonymous
      database:
        host: toolhive-db-rw
        port: 5432
        user: toolhive
        database: toolhive
        sslMode: verify-ca
        maxOpenConns: 10
        maxIdleConns: 5
        connMaxLifetime: 30m