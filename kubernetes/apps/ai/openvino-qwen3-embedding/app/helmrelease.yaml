---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openvino-qwen3-embedding
spec:
  chartRef:
    kind: OCIRepository
    name: openvino-qwen3-embedding
  interval: 1h
  values:
    controllers:
      openvino-qwen3-embedding:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          download-model:
            image:
              repository: openvino/model_server
              tag: latest-py
            args:
              - --pull
              - --model_repository_path
              - /models
              - --source_model
              - OpenVINO/Qwen3-Embedding-0.6B-int8-ov
              - --pooling
              - LAST
              - --task
              - embeddings
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
          config-model:
            image:
              repository: openvino/model_server
              tag: latest-py
            args:
              - --add_to_config
              - --config_path
              - /models/config.json
              - --model_name
              - Qwen3-Embedding-0.6B-int8-ov
              - --model_path
              - OpenVINO/Qwen3-Embedding-0.6B-int8-ov
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
        containers:
          app:
            image:
              repository: openvino/model_server
              tag: latest
            args:
              - --model_path
              - /model/OpenVINO/Qwen3-Embedding-0.6B-int8-ov
              - --model_name
              - qwen3-embedding
              - --port
              - "9000"
              - --rest_port
              - "8000"
              - --task
              - embeddings
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/config
                    port: 8000
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/config
                    port: 8000
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/config
                    port: 8000
                  failureThreshold: 60
                  periodSeconds: 10
            resources:
              requests:
                cpu: 200m
                memory: 2Gi
                gpu.intel.com/i915: "1"
              limits:
                memory: 4Gi
                gpu.intel.com/i915: "1"
    service:
      app:
        controller: openvino-qwen3-embedding
        ports:
          http:
            port: 8000
          grpc:
            port: 9000
    persistence:
      models:
        type: nfs
        server: pve.jonathanrosshart.com
        path: /pool/share/fileshare/models
        globalMounts:
          - path: /models
