---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sensitive-apps
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: sensitive
    namespace: flux-system
  path: "./cluster/config"
  prune: true
  wait: true