---
# 2. The Sync: Tells Flux to apply the manifests from that repo
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sensitive-apps
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 2m
  # Forces all resources from this repo into the 'sensitive' namespace
  targetNamespace: sensitive
  sourceRef:
    kind: GitRepository
    name: sensitive
  path: "./cluster/config"
  prune: true
  wait: true