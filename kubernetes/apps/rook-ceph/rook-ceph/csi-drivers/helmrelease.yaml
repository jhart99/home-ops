---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  chart:
    spec:
      chart: ceph-csi-drivers
      version: v1.20.0
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
        namespace: rook-ceph
  interval: 1h
  values:
    # ServiceMonitor for the operator itself (if supported)
    # The drivers chart manages CephCSIDriver CRs which the operator then uses.
    operatorConfig:
      driverSpecDefaults:
        cephFs:
          kernelMountOptions: ms_mode=prefer-crc
        # Liveness is usually enabled by default in the operator's driver spec
    # Deploy default drivers
    drivers:
      rbd:
        enabled: true
      cephfs:
        enabled: true
    # readAffinity was in the cluster spec, but if we want it global:
    # readAffinity:
    #   enabled: true
