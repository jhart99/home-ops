---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: trivy
  # https://github.com/aquasecurity/trivy-operator/blob/v0.12.0/deploy/helm/values.yaml
  values:
    # ============================================
    # Pod Security Context (root level - for operator deployment)
    # Required for restricted PSS namespace
    # NOTE: These settings apply to the trivy-operator deployment pod
    # ============================================
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 10000
      runAsGroup: 10000
      fsGroup: 10000
      seccompProfile:
        type: RuntimeDefault

    # ============================================
    # Container Security Context (root level - for operator container)
    # Required for restricted PSS namespace
    # NOTE: These settings apply to the trivy-operator container
    # ============================================
    securityContext:
      runAsNonRoot: true
      runAsUser: 10000
      runAsGroup: 10000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    # ============================================
    # Operator Configuration
    # ============================================
    operator:
      # Resource limits for the operator itself
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi

      # Replicas for HA
      replicas: 1

      # ----------------------------------------
      # Scan frequency settings (reduce cluster load)
      # ----------------------------------------
      # Max concurrent scan jobs (default: 10)
      scanJobsConcurrentLimit: 3
      # Max concurrent node collector jobs (default: 1)
      scanNodeCollectorLimit: 1
      # Delay between retrying failed scans (default: 30s)
      scanJobsRetryDelay: 60s
      # How long reports are valid before re-scanning (default: 24h)
      scannerReportTTL: "72h"
      # Cluster SBOM cache TTL (default: 120h)
      cacheReportTTL: "168h"

    # ============================================
    # Trivy Operator Configuration
    # ============================================
    trivy:
      # Ignore vulnerabilities without available fixes to reduce noise
      ignoreUnfixed: true

      # Severity threshold for vulnerability detection
      severity: CRITICAL,HIGH,MEDIUM

      # Resource limits for Trivy scanner jobs
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      storageClassName: ceph-block

    # ============================================
    # Scan Job Configuration (trivyOperator section)
    # ============================================
    trivyOperator:
      # Pod security context for scan jobs
      scanJobPodTemplatePodSecurityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      # Container security context for scan jobs
      scanJobPodTemplateContainerSecurityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault

    # ============================================
    # Compliance and RBAC Scanning
    # ============================================
    compliance:
      enabled: true
      # Run compliance scans once daily at midnight (default: every 6 hours)
      cron: "0 0 * * *"

    rbacAssessment:
      enabled: true

    infraAssessment:
      enabled: true

    configAudit:
      enabled: true

    exposedSecretReport:
      enabled: true

    # ============================================
    # Vulnerability Report Configuration
    # ============================================
    vulnerabilityReports:
      scanner: Trivy

    # ============================================
    # Service Monitor Configuration
    # ============================================
    serviceMonitor:
      enabled: true
      # Add label to match Prometheus ServiceMonitor selector
      additionalLabels:
        prometheus: kube-prometheus-stack
      interval: 30s
      scrapeTimeout: 10s

    nodeCollector:
      # dropping some mounts adding some mounts for Talos
      volumeMounts:
        - {"mountPath":"/var/lib/etcd","name":"var-lib-etcd","readOnly":true}
        - {"mountPath":"/var/lib/kubelet","name":"var-lib-kubelet","readOnly":true}
        - {"mountPath":"/var/lib/kube-scheduler","name":"var-lib-kube-scheduler","readOnly":true}
        - {"mountPath":"/var/lib/kube-controller-manager","name":"var-lib-kube-controller-manager","readOnly":true}
        - {"mountPath":"/etc/kubernetes","name":"etc-kubernetes","readOnly":true}
        - {"mountPath":"/etc/cni/net.d/","name":"etc-cni-netd","readOnly":true}
        - {"mountPath":"/system/secrets/kubernetes","name":"system-secrets-kubernetes","readOnly":true}
        - {"mountPath":"/system/services","name":"system-services","readOnly":true}
        - {"mountPath":"/etc/cri/conf.d","name":"etc-cri-confd","readOnly":true}
      volumes:
        - {"hostPath":{"path":"/var/lib/etcd"},"name":"var-lib-etcd"}
        - {"hostPath":{"path":"/var/lib/kubelet"},"name":"var-lib-kubelet"}
        - {"hostPath":{"path":"/var/lib/kube-scheduler"},"name":"var-lib-kube-scheduler"}
        - {"hostPath":{"path":"/var/lib/kube-controller-manager"},"name":"var-lib-kube-controller-manager"}
        - {"hostPath":{"path":"/etc/kubernetes"},"name":"etc-kubernetes"}
        - {"hostPath":{"path":"/etc/cni/net.d/"},"name":"etc-cni-netd"}
        - {"hostPath":{"path":"/system/secrets/kubernetes"},"name":"system-secrets-kubernetes"}
        - {"hostPath":{"path":"/system/services"},"name":"system-services"}
        - {"hostPath":{"path":"/etc/cri/conf.d"},"name":"etc-cri-confd"}