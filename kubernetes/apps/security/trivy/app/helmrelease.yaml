---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: trivy
  # https://github.com/aquasecurity/trivy-operator/blob/v0.12.0/deploy/helm/values.yaml
  values:
    operator:
      replicas: 1
      scanJobsConcurrentLimit: 1
      scanJobTTL: 10s
      builtInTrivyServer: true
      vulnerabilityScannerScanOnlyCurrentRevisions: true
      configAuditScannerScanOnlyCurrentRevisions: true

    trivy:
      ignoreUnfixed: true
      mode: ClientServer
      storageClassName: ceph-block

      slow: true
      resources:
        requests:
          cpu: 100m
        limits:
          cpu: 500m

    serviceMonitor:
      enabled: false

    nodeCollector:
      volumeMounts:
        - {"mountPath":"/var/lib/etcd","name":"var-lib-etcd","readOnly":true}
        - {"mountPath":"/var/lib/kubelet","name":"var-lib-kubelet","readOnly":true}
        - {"mountPath":"/var/lib/kube-scheduler","name":"var-lib-kube-scheduler","readOnly":true}
        - {"mountPath":"/var/lib/kube-controller-manager","name":"var-lib-kube-controller-manager","readOnly":true}
        - {"mountPath":"/etc/kubernetes","name":"etc-kubernetes","readOnly":true}
        - {"mountPath":"/etc/cni/net.d/","name":"etc-cni-netd","readOnly":true}
      volumes:
        - {"hostPath":{"path":"/var/lib/etcd"},"name":"var-lib-etcd"}
        - {"hostPath":{"path":"/var/lib/kubelet"},"name":"var-lib-kubelet"}
        - {"hostPath":{"path":"/var/lib/kube-scheduler"},"name":"var-lib-kube-scheduler"}
        - {"hostPath":{"path":"/var/lib/kube-controller-manager"},"name":"var-lib-kube-controller-manager"}
        - {"hostPath":{"path":"/etc/kubernetes"},"name":"etc-kubernetes"}
        - {"hostPath":{"path":"/etc/cni/net.d/"},"name":"etc-cni-netd"}