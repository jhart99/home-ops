---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-dashboard
  namespace: trivy-system
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: trivy-dashboard
  maxHistory: 2
  values:
    gitHub:
      serverCheckForUpdates: false
    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 100m
      limits:
        memory: 384Mi