apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: oauth2proxy
  namespace: flux-system
spec:
  dependsOn:
    - name: authentik
  targetNamespace: security
  path: ./kubernetes/apps/security/oauth2proxy/app
  postBuild:
    substitute:
      APP: oauth2proxy
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  timeout: 5m
  wait: false
