apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wazuh
  namespace: flux-system
spec:
  targetNamespace: security
  path: ./kubernetes/apps/security/wazuh/app
  postBuild:
    substitute:
      APP: wazuh
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  timeout: 5m
  wait: false
