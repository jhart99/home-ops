---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wazuh
spec:
  interval: 30m
  chart:
    spec:
      chart: wazuh
      version: 1.0.22
      sourceRef:
        kind: HelmRepository
        name: wazuh
  values:
    # Use existing cert-manager, don't deploy new one
    cert-manager:
      enabled: false

    # Use cert-manager for internal certificates (self-signed CA)
    # Let the chart create its own self-signed issuer for mTLS
    certificates:
      enabled: true
      issuer:
        name: null
        type: issuer

    # Indexer configuration
    indexer:
      enabled: true
      replicas: 1  # Start with single replica
      storageSize: 50Gi
      storageClass: ceph-block
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 2Gi
      cred:
        existingSecret: wazuh-secret
      # Sysctl set at Talos node level (machine-sysctls.yaml)
      sysctlImage:
        enabled: false
      nodeSelector: { kubernetes.io/arch: amd64 }
      livenessProbe:
        periodSeconds: 20
        timeoutSeconds: 5
        failureThreshold: 10
        successThreshold: 1
        initialDelaySeconds: 10
        scheme: HTTPS
    tcpSocket:
      port: 9200
      # Add missing action_groups.yml (chart bug)
      additionalConfigs:
        action_groups.yml: |
          _meta:
            type: "actiongroups"
            config_version: 2

    # Dashboard configuration
    dashboard:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      nodeSelector: { kubernetes.io/arch: amd64 }
      cred:
        existingSecret: wazuh-secret
      ingress:
        # grumble... need to define this externally since http routes aren't in helm chart
        enabled: false

    # Wazuh Manager configuration
    wazuh:
      enabled: true
      # API credentials for dashboard connection
      apiCred:
        existingSecret: wazuh-secret
      # Agent enrollment password
      authd:
        enabled: true
        existingSecret: wazuh-secret
      # LoadBalancer for external agents (like OPNsense)
      loadBalancer:
        enabled: true
        annotations:
          io.cilium/lb-ipam-ips: "192.168.30.29"
      nodeSelector: { kubernetes.io/arch: amd64 }
      # Indexer credentials for filebeat
      indexerCred:
        existingSecret: wazuh-secret
      master:
        enabled: true
        storageSize: 50Gi
        storageClass: ceph-block
        extraEnvVars:
          - name: INDEXER_USERNAME
            value: "admin"
          - name: AUTHD_PASS
            valueFrom:
              secretKeyRef:
                name: wazuh-secret
                key: AUTHD_PASS
        nodeSelector: { kubernetes.io/arch: amd64 }
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      worker:
        enabled: false  # Disable workers for single-node setup
        replicas: 0

    # Deploy agents as DaemonSet on cluster nodes
    agent:
      enabled: false