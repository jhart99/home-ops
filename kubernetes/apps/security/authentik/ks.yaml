apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik
  namespace: flux-system
spec:
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: cnpg-operator
      namespace: database
    - name: rook-ceph-cluster
      namespace: rook-ceph
  targetNamespace: security
  path: ./kubernetes/apps/security/authentik/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  timeout: 5m
  postBuild:
    substitute:
      APP: authentik
  wait: false
