---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 5m
  chart:
    spec:
      chart: authentik
      version: 2025.12.3
      sourceRef:
        kind: HelmRepository
        name: authentik-charts
      interval: 5m
  values:
    global:
      image:
        repository: ghcr.io/goauthentik/server
        tag: 2025.12.3
      fullnameOverride: authentik
    authentik:
      log_level: debug
      avatars: "initials"
     #  email:
     #    host: "smtp-relay.default.svc.cluster.local"
     #    port: 587
     #    use_tls: false
     #    from: "no-reply@skylab.fi"
      secret_key: "${SECRET_AUTHENTIK_SECRET_KEY}"
      error_reporting:
        enable: true
        send_pii: false
        environment: "kryptonian"
      outposts:
        container_image_base: ghcr.io/goauthentik/%(type)s:%(version)s
      postgresql:
        enabled: false
        # Point to the CNPG Service in the SAME namespace
        host: "authentik-db-rw.security.svc.cluster.local"
        name: "authentik"
        user: "authentik"
        password: ""
      # redis:
      #   host: "dragonfly.databases.svc.cluster.local"

    server:
      replicas: 1
      pdb:
        enabled: false
        minAvailable: 1
        maxUnavailable: 1
      route:
        main:
          enabled: true
          hostnames: ["auth.rnatr.com"]
          parentRefs:
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: envoy-internal
              namespace: networking
              sectionName: https
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: envoy-external
              namespace: networking
              sectionName: https
      metrics:
        serviceMonitor:
          enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi
    worker:
      replicas: 1
      serviceAccount:
        create: true
      pdb:
        enabled: false
        minAvailable: 1
        maxUnavailable: 1
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          memory: 1.5Gi
    prometheus:
      rules:
        enabled: true
    postgresql:
      enabled: false
    redis:
      enabled: false