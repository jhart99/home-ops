---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 5m
  chart:
    spec:
      chart: authentik
      version: 2025.12.3
      sourceRef:
        kind: HelmRepository
        name: authentik-charts
      interval: 5m
  values:
    global:
      image:
        repository: ghcr.io/goauthentik/server
        tag: 2025.12.3
      fullnameOverride: authentik
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: secretKey

        - name: AUTHENTIK_POSTGRESQL__HOST
          valueFrom:
            secretKeyRef:
              name: authentik-db-app  # The secret created by CNPG
              key: host               # CNPG standard key for host

        - name: AUTHENTIK_POSTGRESQL__NAME
          valueFrom:
            secretKeyRef:
              name: authentik-db-app
              key: dbname             # CNPG standard key for database name

        - name: AUTHENTIK_POSTGRESQL__USER
          valueFrom:
            secretKeyRef:
              name: authentik-db-app
              key: user               # CNPG standard key for username

        - name: AUTHENTIK_POSTGRESQL__PORT
          valueFrom:
            secretKeyRef:
              name: authentik-db-app
              key: port               # CNPG standard key for port

        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-db-app
              key: password           # CNPG standard key for password
    authentik:
      log_level: debug
      avatars: "initials"
     #  email:
     #    host: "smtp-relay.default.svc.cluster.local"
     #    port: 587
     #    use_tls: false
     #    from: "no-reply@skylab.fi"
      error_reporting:
        enable: true
        send_pii: false
        environment: "kryptonian"
      outposts:
        container_image_base: ghcr.io/goauthentik/%(type)s:%(version)s
      postgresql:
        enabled: false
        # Point to the CNPG Service in the SAME namespace
        host: "authentik-db-rw.security.svc.cluster.local"
        name: "authentik"
        user: "authentik"
        password: ""
      # redis:
      #   host: "dragonfly.databases.svc.cluster.local"

    server:
      replicas: 1
      pdb:
        enabled: false
        minAvailable: 1
        maxUnavailable: 1
      route:
        main:
          enabled: true
          hostnames: ["auth.rnatr.com"]
          parentRefs:
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: envoy-internal
              namespace: networking
              sectionName: https
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: envoy-external
              namespace: networking
              sectionName: https
      metrics:
        serviceMonitor:
          enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi
      volumes:
        - name: db-cert
          secret:
            secretName: authentik-user-tls
        - name: db-ca
          secret:
            secretName: authentik-db-ca-secret
      volumeMounts:
        - name: db-cert
          mountPath: /certs/db-user
          readOnly: true
        - name: db-ca
          mountPath: /certs/db-ca
          readOnly: true
      env:
        - name: AUTHENTIK_POSTGRESQL__SSLMODE
          value: "verify-full"
        - name: AUTHENTIK_POSTGRESQL__SSLCERT
          value: "/certs/db-user/tls.crt"
        - name: AUTHENTIK_POSTGRESQL__SSLKEY
          value: "/certs/db-user/tls.key"
        - name: AUTHENTIK_POSTGRESQL__SSLROOTCERT
          value: "/certs/db-ca/ca.crt"
    worker:
      replicas: 1
      serviceAccount:
        create: true
      pdb:
        enabled: false
        minAvailable: 1
        maxUnavailable: 1
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          memory: 1.5Gi
      volumes:
        - name: db-cert
          secret:
            secretName: authentik-user-tls
        - name: db-ca
          secret:
            secretName: authentik-db-ca-secret
      volumeMounts:
        - name: db-cert
          mountPath: /certs/db-user
          readOnly: true
        - name: db-ca
          mountPath: /certs/db-ca
          readOnly: true
      env:
        - name: AUTHENTIK_POSTGRESQL__SSLMODE
          value: "verify-full"
        - name: AUTHENTIK_POSTGRESQL__SSLCERT
          value: "/certs/db-user/tls.crt"
        - name: AUTHENTIK_POSTGRESQL__SSLKEY
          value: "/certs/db-user/tls.key"
        - name: AUTHENTIK_POSTGRESQL__SSLROOTCERT
          value: "/certs/db-ca/ca.crt"
    prometheus:
      rules:
        enabled: true
    postgresql:
      enabled: false
    redis:
      enabled: false