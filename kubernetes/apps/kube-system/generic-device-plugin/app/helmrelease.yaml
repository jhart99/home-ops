---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: generic-device-plugin
spec:
  chartRef:
    kind: OCIRepository
    name: generic-device-plugin
  interval: 1h
  values:
    controllers:
      generic-device-plugin:
        type: daemonset
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          generic-device-plugin:
            image:
              repository: ghcr.io/squat/generic-device-plugin
              tag: latest@sha256:2e0c0b78043d5f0885b99c9ac3c1506844c9645081740d2394ce6e23b168bfe8
            args:
              - --log-level=info
              - --domain=rnatr.com
              - --device
              - |
                name: zwave
                groups:
                  - usb:
                      - vendor: "1a86"
                      - device: "55d4"
                  - paths:
                      - path: /dev/serial/by-id/usb-Zooz_800_Z-Wave_Stick_533D004242-if00
                        mountPath: /dev/zwave
              - --device
              - |
                name: zigbee
                groups:
                  - usb:
                      - vendor: "10c4"
                      - device: "ea60"
                  - paths:
                      - path: /dev/serial/by-id/usb-Itead_Sonoff_Zigbee_3.0_USB_Dongle_Plus_V2_e60b847ecbf3ef118b51bd1b6d9880ab-if00-port0
                        mountPath: /dev/zigbee
            ports:
              - containerPort: 8080
                name: http
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 64Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    persistence:
      dev:
        type: hostPath
        hostPath: /dev
        globalMounts:
          - path: /dev
      sys:
        type: hostPath
        hostPath: /sys
        globalMounts:
          - readOnly: true
      device-plugin:
        type: hostPath
        hostPath: /var/lib/kubelet/device-plugins
        globalMounts:
          - path: /var/lib/kubelet/device-plugins
