---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-gpu-operator
spec:
  interval: 15m
  chart:
    spec:
      chart: gpu-operator
      version: v26.3.3
      sourceRef:
        kind: HelmRepository
        name: nvidia
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    devicePlugin:
      enabled: true
      config:
        name: time-sharing-config
        default: any
    driver:
      enabled: false
    hostPaths:
      driverInstallDir: "/usr/local/"
    nfd:
      enabled: false
      nodefeaturerules: true
    toolkit:
      enabled: false