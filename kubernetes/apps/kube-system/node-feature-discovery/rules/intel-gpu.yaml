---
apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: intel-gpu
spec:
  rules:
    - name: intel-gpu
      labels:
        feature.node.kubernetes.io/intel-gpu: "true"
      matchAny:
        - matchFeatures:
          - feature: pci.device
            matchExpressions:
              vendor: { op: In, value: ["8086"] }
              device: { op: In, value: ["9bc8"] }
        - matchFeatures:
          - feature: pci.device
            matchExpressions:
              vendor: { op: In, value: ["8086"] }
              device: { op: In, value: ["3e92"] }
        - matchFeatures:
          - feature: pci.device
            matchExpressions:
              vendor: { op: In, value: ["8086"] }
              device: { op: In, value: ["1912"] }
---
apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: intel-arc
spec:
  rules:
    - name: intel-dgpu
      labels:
        feature.node.kubernetes.io/intel-arc: "true"
      matchFeatures:
        - feature: pci.device
          matchExpressions:
            vendor: { op: In, value: ["8086"] }
            device: { op: In, value: ["56a6"] }