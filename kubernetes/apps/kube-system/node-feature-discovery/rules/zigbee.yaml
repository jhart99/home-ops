---
apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: sonoff-zigbee-rule
spec:
  rules:
    - name: "sonoff-zigbee"
      labels:
        feature.node.kubernetes.io/sonoff-zigbee: "true"
      matchFeatures:
        - feature: "usb.device"
          matchExpressions:
            vendor: { op: In, value: ["10c4"] }
            device: { op: In, value: ["ea60"] }