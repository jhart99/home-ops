---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-dra-driver
spec:
  interval: 15m
  chart:
    spec:
      chart: nvidia-dra-driver-gpu
      version: v25.12.0
      sourceRef:
        kind: HelmRepository
        name: nvidia-dra
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    resources:
      gpus:
        enabled: true
      computeDomains:
        enabled: false
    gpuResourcesEnabledOverride: true
    nvidiaDriverRoot: '/usr/local'