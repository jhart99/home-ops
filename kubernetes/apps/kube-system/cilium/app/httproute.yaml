---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-ui
  namespace: kube-system
spec:
  parentRefs:
  - name: envoy-internal
    namespace: network
  hostnames:
  - hubble.rnatr.com
  rules:
    - backendRefs:
      - group: ""
        name: hubble-ui
        namespace: kube-system
        port: 80
      matches:
      - path:
          type: PathPrefix
          value: /