# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name jupyterhub
spec:
  interval: 30m
  chart:
    spec:
      chart: jupyterhub
      version: 4.3.3-0.dev.git.7285.h2e426380
      sourceRef:
        kind: HelmRepository
        name: jupyterhub
      interval: 30m
  values:
    debug:
      enabled: true
    hub:
      networkPolicy:
        enabled: false
    proxy:
      chp:
        networkPolicy:
          enabled: false
    singleuser:
      cloudMetadata:
        blockWithIptables: false
      networkPolicy:
        enabled: false
      profileList:
        - display_name: "Minimal environment"
          description: "To avoid too much bells and whistles: Python."
        - display_name: "Pyspark environment"
          description: "Spark Env"
          kubespawner_override:
            image: jupyter/pyspark-notebook:latest
          default: true
        - display_name: "Datascience environment"
          description: "If you want the additional bells and whistles: Python, R, and Julia."
          kubespawner_override:
            image: jupyter/datascience-notebook:latest

        # --- NEW SELKIES PROFILE ---
        - display_name: "Selkies VDI (WebRTC Desktop)"
          description: "Hardware-accelerated Linux desktop with direct network access."
          kubespawner_override:
            # Multi-arch base image for ARM64 compatibility
            image: lscr.io/linuxserver/chromium:latest
            # 1. Forces the container to start as root for s6-overlay init
            uid: 0

            # 2. Instructs s6-overlay which user ID to drop down to after init.
            # Match this to the permissions required by your Ceph Rook PVCs.
            environment:
              PUID: "1000"
              PGID: "100"

            shm_size: "2G"

            extra_annotations:
              io.cilium.ipam.ip-pool: "jupyter-vdi-pool"

            extra_resource_limits:
              nvidia.com/gpu: "1"
              memory: "4G"
            extra_resource_guarantees:
              memory: "2G"
      storage:
        type: none
        extraVolumes:
          - name: jupyter-pvc
            persistentVolumeClaim:
              claimName: jupyterhub
        extraVolumeMounts:
          - name: jupyter-pvc
            mountPath: /home/shared
    httpRoute:
      enabled: true
      hostnames:
        - jupyterhub.rnatr.com
      gateway:
        name: envoy-internal
        namespace: network