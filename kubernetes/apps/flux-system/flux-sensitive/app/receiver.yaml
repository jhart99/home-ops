---
apiVersion: notification.toolkit.fluxcd.io/v1
kind: Receiver
metadata:
  name: forgejo-webhook
  namespace: flux-system
spec:
  type: github
  events: ["ping", "push"]
  secretRef:
    name: forgejo-webhook-token-secret
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: GitRepository
      name: sensitive
      namespace: flux-system
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: sensitive
      namespace: flux-system