---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coder
spec:
  interval: 30m
  chart:
    spec:
      chart: coder
      version: 2.35.2
      sourceRef:
        kind: HelmRepository
        name: coder-charts
  values:
    podAnnotations:
      secret.reloader.stakater.com/reload: coder-secret
    coder:
      env:
        # DB
        - name: CODER_PG_CONNECTION_URL
          valueFrom:
            secretKeyRef:
              name: coder-db-app
              key: uri
        # App
        - name: CODER_ACCESS_URL
          value: https://coder.${SECRET_DOMAIN}