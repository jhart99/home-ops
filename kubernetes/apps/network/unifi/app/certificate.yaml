---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: 'unifi'
spec:
  secretName: 'unifi'
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: 'unifi.rnatr.com'
  dnsNames:
    - 'unifi.rnatr.com'