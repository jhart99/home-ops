---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unifi
spec:
  chartRef:
    kind: OCIRepository
    name: unifi
  interval: 1h
  values:
    controllers:
      unifi:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/jacobalberty/unifi-docker
              tag: v10.0.162@sha256:896c0ab82d33300694dae82982fd7094497afcbea0be92cadc1e94bfead731d3
              pullPolicy: IfNotPresent
            env:
              RUNAS_UID0: "true"
              UNIFI_UID: "999"
              UNIFI_GID: "999"
              UNIFI_STDOUT: "true"
              JVM_INIT_HEAP_SIZE:
              JVM_MAX_HEAP_SIZE: 1024M
              SYSTEM_IP: &system_ip 192.168.30.20
            resources:
              requests:
                memory: 2Gi
                cpu: 50m
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
    service:
      app:
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "unifi.${SECRET_DOMAIN}"
          lbipam.cilium.io/ips: *system_ip
        externalTrafficPolicy: Local
        ports:
          https:
            port: 8443
          controller:
            port: 8080
          speedtest:
            port: 6789
          stun:
            port: 3478
          syslog:
            port: 5514
          discovery:
            port: 10001
    persistence:
      config:
        enabled: true
        existingClaim: unifi
        globalMounts:
          - path: /unifi
      cert:
        type: secret
        name: 'unifi'
        advancedMounts:
          unifi:
            app:
              - path: /unifi/cert/cert.pem
                subPath: tls.crt
                readOnly: true
              - path: /unifi/cert/privkey.pem
                subPath: tls.key
                readOnly: true