---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openwrt-dns
spec:
  chartRef:
    kind: OCIRepository
    name: openwrt-dns
  interval: 1h
  values:
    fullnameOverride: *app
    nodeSelector: { kubernetes.io/arch: amd64 }
    provider:
      name: webhook
      webhook:
        image:
          repository: docker.io/renanqts/external-dns-openwrt-webhook
          tag: v0.1.0
        serviceMonitor:
          enabled: false
        env:
          - name: LOG_LEVEL
            value: debug
          - name: PROVIDER_OPENWRT_LUCIRPC_HOSTNAME
            valueFrom:
              secretKeyRef:
                name: &secret openwrt-dns-secret
                key: PROVIDER_OPENWRT_LUCIRPC_HOSTNAME
          - name: PROVIDER_OPENWRT_LUCIRPC_AUTH_USERNAME
            valueFrom:
              secretKeyRef:
                name: *secret
                key: PROVIDER_OPENWRT_LUCIRPC_AUTH_USERNAME
          - name: PROVIDER_OPENWRT_LUCIRPC_AUTH_PASSWORD
            valueFrom:
              secretKeyRef:
                name: *secret
                key: PROVIDER_OPENWRT_LUCIRPC_AUTH_PASSWORD
        livenessProbe:
          httpGet:
            path: /ping
            port: 8888
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ping
            port: 8888
          initialDelaySeconds: 10
          timeoutSeconds: 5
        service:
          port: 8888
    triggerLoopOnEvent: true
    policy: sync
    sources:
      - gateway-httproute
      - service
    txtOwnerId: main
    txtPrefix: k8s.main.
    domainFilters:
      - "${SECRET_DOMAIN}"
    serviceMonitor:
      enabled: false
