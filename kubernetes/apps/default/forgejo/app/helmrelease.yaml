---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo
  interval: 1h
  # All values at https://code.forgejo.org/forgejo-helm/forgejo-helm
  values:
    service:
      ssh:
        type: LoadBalancer
        port: 2222
        annotations:
          metallb.io/loadBalancerIPs: "${CLUSTER_EXTERNAL_SUBNET_PREFIX}.${CLUSTER_LB_FORGEJO}"

    persistence:
      enabled: true
      create: false
      claimName: nfs-forgejo

    # databases
    redis-cluster:
      enabled: true
    postgresql-ha:
      enabled: false
    postgresql:
      enabled: false

    gitea:
      admin:
        username: forgejo-admin
        # password: set in secret
        email: "forgejo@${CLUSTER_SHORT_DOMAIN}"

      # See https://forgejo.org/docs/latest/admin/config-cheat-sheet/
      config:
        APP_NAME: "Forgejo for ${CLUSTER_SHORT_DOMAIN}"
        #RUN_MODE: dev
        server:
          SSH_PORT : 2222
          SSH_LISTEN_PORT : 2222
        security:
          PASSWORD_COMPLEXITY: spec
        database:
          DB_TYPE: postgres
        service:
          REQUIRE_SIGNIN_VIEW: true
          DISABLE_REGISTRATION: true
          ENABLE_NOTIFY_MAIL: true
        openid:
          ENABLE_OPENID_SIGNIN: false
        oauth2:
          ENABLE_AUTO_REGISTRATION: true
          USERNAME: nickname
          UPDATE_AVATAR: true
          ACCOUNT_LINKING: auto
        mailer:
          ENABLED: true
          SMTP_ADDR: "${CLUSTER_MAIL_SERVER}"
          SMTP_PORT: "${CLUSTER_MAIL_SERVER_PORT}"
          PROTOCOL: smtp
          FROM: "forgejo@${CLUSTER_SHORT_DOMAIN}"
          USER: ""
          PASSWD: ""
    httpRoute:
      enabled: true
      hostnames: [ "git.rnatr.com" ]
      parentRefs:
        - name: envoy-internal
          namespace: network

  valuesFrom:
    - kind: Secret
      name: "forgejo-helm-values"
      valuesKey: forgejo.yaml
      optional: false
    - kind: Secret
      name: forgejo-db-app
      optional: false
      valuesKey: host
      targetPath: gitea.config.database.HOST
    - kind: Secret
      name: forgejo-db-app
      optional: false
      valuesKey: dbname
      targetPath: gitea.config.database.NAME
    - kind: Secret
      name: forgejo-db-app
      optional: false
      valuesKey: password
      targetPath: gitea.config.database.PASSWD
    - kind: Secret
      name: forgejo-db-app
      optional: false
      valuesKey: user
      targetPath: gitea.config.database.USER