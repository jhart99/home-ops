---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo
  interval: 1h
  # All values at https://code.forgejo.org/forgejo-helm/forgejo-helm
  values:
    service:
      ssh:
        type: LoadBalancer
        port: 2222
        annotations:
          external-dns.alpha.kubernetes.io/hostname: git.rnatr.com
          lbipam.cilium.io/ips: 192.168.30.22
        externalTrafficPolicy: Local
    persistence:
      enabled: true
      claimName: forgejo
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

    # databases
    redis-cluster:
      enabled: false
    postgresql-ha:
      enabled: false
    postgresql:
      enabled: false

    gitea:
      admin:
        existingSecret: forgejo-admin-secret
        email: "forgejo@rnatr.com"

      # See https://forgejo.org/docs/latest/admin/config-cheat-sheet/
      config:
        APP_NAME: "Forgejo for rnatr.com"
        migrations:
          ALLOW_DOMAINS: "github.com, *.github.com, *.rnatr.com, *.jonathanrosshart.com, gitlab.com, *.gitlab.com"
          ALLOW_LOCALNETWORKS: true
          MAX_ATTEMPTS: 3
          RETRY_BACKOFF: 3
        security:
          PASSWORD_COMPLEXITY: spec
        server:
          DOMAIN: forgejo.${SECRET_DOMAIN}
          ENABLE_PPROF: true
          LANDING_PAGE: explore
          ROOT_URL: https://forgejo.${SECRET_DOMAIN}
          SSH_DOMAIN: git.${SECRET_DOMAIN}
          SSH_LISTEN_PORT : 2222
          SSH_PORT : 2222
        service:
          DISABLE_REGISTRATION: true
          ENABLE_NOTIFY_MAIL: true
          REQUIRE_SIGNIN_VIEW: true
        webhook:
          ALLOWED_HOST_LIST: "*.${SECRET_DOMAIN}"
    httpRoute:
      enabled: true
      hostnames: [ "forgejo.rnatr.com" ]
      parentRefs:
        - name: envoy-internal
          namespace: network