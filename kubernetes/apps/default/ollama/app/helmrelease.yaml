---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
spec:
  chartRef:
    kind: OCIRepository
    name: ollama
  interval: 1h
  values:
    defaultPodOptions:
      runtimeClassName: nvidia

    controllers:
      ollama:
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 0.19.0
            env:
              OLLAMA_MODELS: /models
              OLLAMA_HOST: 0.0.0.0:11434
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 11434
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
            resources:
              requests:
                cpu: 200m
                memory: 2Gi
                ephemeral-storage: "30Gi"
              limits:
                memory: 8Gi
                nvidia.com/gpu: "1"
                ephemeral-storage: "100Gi"

    service:
      app:
        ports:
          http:
            port: *port

    persistence:
      models:
        type: emptyDir
        globalMounts:
          - path: /models
