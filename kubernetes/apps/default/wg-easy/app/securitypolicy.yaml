---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: wg-easy-oauth-policy
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: wg-easy
  oidc:
    provider:
      issuer: "https://auth.rnatr.com/application/o/echo-oidcauth"
    clientID: "WqgzUIgnNj8mRt3VgHcCAi2Mt2jpzONuTXBja154"
    clientSecret:
      name: wg-easy-client-secret
    redirectURL: "https://wireguard.rnatr.com/oauth2/callback"
    cookieDomain: "rnatr.com"
    cookieNames:
      accessToken: "access-token"
    scopes:
      - "openid"
      - "email"
      - "profile"
      - "groups"
      - "offline_access"
  jwt:
    providers:
      - name: authentik
        issuer: https://auth.rnatr.com/application/o/echo-oidcauth/
        remoteJWKS:
          uri: https://auth.rnatr.com/application/o/echo-oidcauth/jwks/
        extractFrom:
          cookies:
            - "access-token"
    rules:
      - principal:
          provider: authentik
        claims:
          - name: groups
            values:
              - "admin"
              - "superuser"