---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: secure-backend-ingress
  namespace: default
spec:
  endpointSelector:
    matchLabels:
      app: echo-oidc
  ingress:
    - fromEndpoints:
        # ONLY allow traffic from the Envoy Gateway
        - matchLabels:
            gateway.envoyproxy.io/owning-gateway-name: envoy-external
            gateway.envoyproxy.io/owning-gateway-namespace: network
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: limit-outbound-access
spec:
  endpointSelector:
    matchLabels:
      app: echo-oidc
  egress:
    # Rule 1: Allow DNS (Required to resolve domains)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
    # Rule 2: Allow ONLY Stripe API
    - toFQDNs:
        - matchName: "api.stripe.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP