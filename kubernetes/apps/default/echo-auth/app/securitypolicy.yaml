apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: echo-auth-oauth-policy
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: echo-auth

  extAuth:
    http:
      backendRefs:
        - name: oauth2proxy-oauth2-proxy # The K8s Service for OAuth2 Proxy
          namespace: security
          port: 80
          sectionName: "rule-1"

      # Define which headers from the OAuth2 Proxy response (200 OK)
      # should be copied to the request sent to your backend.
      headersToBackend:
        - "Authorization"       # The Bearer Token (JWT)
        - "X-Auth-Request-User" # The Email/User ID
        - "X-Auth-Request-Email"
