---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
spec:
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  interval: 30m
  values:
    fullnameOverride: renovate-operator
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      dashboard:
        enabled: true
    route:
      enabled: true
      hostnames: ["renovate.${SECRET_DOMAIN}"]
      parentRefs:
        - name: envoy-internal
          namespace: network
    valkey:
      existingSecret: "renovate-operator-secret"
      existingSecretKey: "dragonfly_url"
    webhook:
      enabled: true
      route:
        enabled: true
        hostnames: ["renovate-webhook.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network