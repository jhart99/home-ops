---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: devshell
spec:
  chartRef:
    kind: OCIRepository
    name: devshell
  interval: 1h
  values:
    controllers:
      devshell:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          sshd:
            image:
              # renovate: datasource=docker depName=lscr.io/linuxserver/openssh-server
              repository: lscr.io/linuxserver/openssh-server
              tag: latest
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: America/New_York
              PASSWORD_ACCESS: "true"
              SUDO_ACCESS: "true"
              USER_NAME:
                valueFrom:
                  secretKeyRef:
                    name: devshell-secret
                    key: username
              USER_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: devshell-secret
                    key: password
              PUBLIC_KEY_FILE: ""
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
          wetty:
            image:
              # renovate: datasource=docker depName=ghcr.io/wettyoss/wetty
              repository: ghcr.io/wettyoss/wetty
              tag: latest
            args:
              - --ssh-host=localhost
              - --ssh-port=2222
              - --ssh-user=
              - --base=/
              - --port=3000
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi

    service:
      ssh:
        controller: devshell
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "devshell-ssh.${SECRET_DOMAIN}"
          lbipam.cilium.io/ips: 192.168.30.25
        ports:
          ssh:
            port: 22
            targetPort: 2222
            protocol: TCP
      web:
        controller: devshell
        ports:
          http:
            port: 3000

    route:
      app:
        hostnames:
          - "devshell.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: web
                port: 3000

    persistence:
      config:
        existingClaim: devshell
        advancedMounts:
          devshell:
            sshd:
              - path: /config
