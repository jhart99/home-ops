---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: devshell
spec:
  chartRef:
    kind: OCIRepository
    name: devshell
  interval: 1h
  values:
    controllers:
      devshell:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          sshd:
            image:
              # renovate: datasource=docker depName=lscr.io/linuxserver/openssh-server
              repository: lscr.io/linuxserver/openssh-server
              tag: latest
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: America/New_York
              PASSWORD_ACCESS: "true"
              SUDO_ACCESS: "true"
              USER_NAME:
                valueFrom:
                  secretKeyRef:
                    name: devshell-secret
                    key: username
              USER_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: devshell-secret
                    key: password
              PUBLIC_KEY_FILE: ""
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
          guacd:
            image:
              # renovate: datasource=docker depName=guacamole/guacd
              repository: guacamole/guacd
              tag: latest
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
          guacamole:
            image:
              # renovate: datasource=docker depName=guacamole/guacamole
              repository: guacamole/guacamole
              tag: latest
            env:
              GUACD_HOSTNAME: localhost
              GUACD_PORT: "4822"
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi

    service:
      ssh:
        controller: devshell
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "devshell-ssh.${SECRET_DOMAIN}"
          lbipam.cilium.io/ips: 192.168.30.25
        ports:
          ssh:
            port: 22
            targetPort: 2222
            protocol: TCP
      web:
        controller: devshell
        ports:
          http:
            port: 8080

    route:
      app:
        hostnames:
          - "devshell.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: web
                port: 8080

    persistence:
      config:
        existingClaim: devshell
        advancedMounts:
          devshell:
            sshd:
              - path: /config
      guacamole-config:
        type: secret
        name: devshell-secret
        advancedMounts:
          devshell:
            guacamole:
              - path: /etc/guacamole/user-mapping.xml
                subPath: user-mapping.xml
                readOnly: true
