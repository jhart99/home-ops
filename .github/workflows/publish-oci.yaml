---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Publish OCI

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@c5902410cf258f55a66235fb4689e375ff3f8f59 # main

      - name: Login to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI Artifact
        run: |
          flux push artifact oci://ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            --path="./kubernetes" \
            --source="${{ github.event.repository.html_url }}" \
            --revision="${{ github.ref_name }}/${{ github.sha }}"
